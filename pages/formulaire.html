
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire complet - Projet Étudiant</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🦋</text></svg>">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <h1>🌸 Mon Projet HTML/CSS 🌸</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="eau.php">Eau</a></li>
                <li><a href="multi.php">Multi (4)</a></li>
                <li><a href="multis.php">Multis</a></li>
                <li><a href="mois.php">Mois</a></li>
                <li><a href="formulaire.html" class="active">Formulaire</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=300" alt="Formulaire" class="hero-image">
            <h2>📝 Formulaire complet</h2>
            <p>Tous les éléments requis pour les TP PHP</p>
        </section>

        <section class="form-container">
            <form action="confirmation.html" method="get">
                <!-- ===== INFORMATIONS PERSONNELLES ===== -->
                <h3 class="form-section-title">👤 Informations personnelles</h3>
                
                <div class="form-group">
                    <label for="nom">Nom complet :</label>
                    <input type="text" id="nom" name="nom" placeholder="Ex: Dupont" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse email :</label>
                    <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label for="age">Âge :</label>
                    <input type="number" id="age" name="age" min="1" max="120" placeholder="18" required>
                </div>

                <div class="form-group">
                    <label for="telephone">Téléphone :</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="06 12 34 56 78">
                </div>

                <!-- ===== LOCALISATION ===== -->
                <h3 class="form-section-title">📍 Localisation</h3>

                <div class="form-group">
                    <label for="pays">Pays de résidence :</label>
                    <select id="pays" name="pays" required>
                        <option value="">-- Choisissez un pays --</option>
                        <option value="france">France</option>
                        <option value="belgique">Belgique</option>
                        <option value="suisse">Suisse</option>
                        <option value="canada">Canada</option>
                        <option value="maroc">Maroc</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ville">Ville :</label>
                    <input type="text" id="ville" name="ville" placeholder="Ex: Paris">
                </div>

                <!-- ===== PRÉFÉRENCES ===== -->
                <h3 class="form-section-title">⚡ Préférences</h3>

                <div class="form-group radio-group">
                    <label>Genre :</label>
                    <div class="radio-options">
                        <div class="radio-option">
                            <input type="radio" id="homme" name="genre" value="homme" required>
                            <label for="homme">Homme</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="femme" name="genre" value="femme">
                            <label for="femme">Femme</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="autre" name="genre" value="autre">
                            <label for="autre">Autre</label>
                        </div>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label>Langues parlées :</label>
                    <div class="checkbox-options">
                        <div class="checkbox-option">
                            <input type="checkbox" id="francais" name="langues[]" value="francais">
                            <label for="francais">Français</label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" id="anglais" name="langues[]" value="anglais">
                            <label for="anglais">Anglais</label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" id="espagnol" name="langues[]" value="espagnol">
                            <label for="espagnol">Espagnol</label>
                        </div>
                    </div>
                </div>

                <div class="form-group condition-group">
                    <div class="condition-option">
                        <input type="checkbox" id="accept" name="accept" required>
                        <label for="accept">J'accepte les conditions d'utilisation</label>
                    </div>
                </div>

                <!-- ===== MESSAGE ===== -->
                <h3 class="form-section-title">💬 Message</h3>

                <div class="form-group">
                    <label for="message">Votre message :</label>
                    <textarea id="message" name="message" rows="5" placeholder="Écrivez votre message ici..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn">Envoyer le formulaire</button>
                    <button type="reset" class="btn btn-reset">Effacer</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>Projet étudiant - 2026 - Tous droits réservés 🌸</p>
    </footer>
</body>
</html>
